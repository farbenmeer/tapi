name: Deploy docs

# Publishes the Toapi docs to GitHub Pages when a changesets release lands on
# main (the "Version Packages" commit), or on demand. This runs independently
# of npm publishing, so a partial `pnpm publish` failure (e.g. packages with no
# version change) never blocks the docs deploy.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent Pages deployment; let a running one finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    # Only for a changesets release commit, or a manual run.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, 'Version Packages')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6.0.9
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - uses: actions/configure-pages@v5
      - run: pnpm install --frozen-lockfile
      - run: pnpm --config.verify-deps-before-run=false --filter @farbenmeer/toapi-docs build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: website-toapi/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
